name: Release app
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        os: [
            { name: 'linux', image: 'ubuntu-latest' },
            { name: 'windows', image: 'windows-latest' },
            { name: 'macos', image: 'macos-latest' },
            { name: 'android', image: 'windows-latest' },
            # { name: 'ios', image: 'macos-latest' },
          ]
    runs-on: ${{ matrix.os.image }}
    steps:
      - name: Github checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts=false
      - name: Install Linux packaging deps
        if: matrix.os.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg dpkg-dev
      - name: Rebuild windows
        if: matrix.os.name == 'windows'
        run: pnpm --filter zero-app-v2 rebuild:windows
      - name: Rebuild macos
        if: matrix.os.name == 'macos'
        run: pnpm --filter zero-app-v2 rebuild:macos
      - name: Create .env from secrets
        shell: bash
        run: |
          mkdir -p apps/zero-app-v2
          {
            echo "PORT=${{ secrets.PORT}}"
            echo "NEXT_PUBLIC_AUTH_API=${{ secrets.NEXT_PUBLIC_AUTH_API }}"
            echo "NEXT_PUBLIC_API=${{ secrets.NEXT_PUBLIC_API }}"
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}"
            echo "CERTIFICATE_PASSWORD=${{ secrets.CERTIFICATE_PASSWORD }}"
            echo "WINDOWS_CERTIFICATE_PASSWORD=${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}"
          } > apps/zero-app-v2/.env
      - name: Build Desktop app
        if: matrix.os.name == 'linux' || matrix.os.name == 'windows' || matrix.os.name == 'macos'
        run: pnpm run build:desktop
      - name: Restore Windows certificate
        if: matrix.os.name == 'windows'
        shell: bash
        run: echo "${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}" | base64 --decode > apps/zero-app-v2/src-electron/cert.pfx
      - name: Sign Windows
        if: matrix.os.name == 'windows'
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: pnpm --filter zero-app-v2 sign:windows
      - name: Publish Desktop app
        if: matrix.os.name == 'linux' || matrix.os.name == 'windows' || matrix.os.name == 'macos'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --filter zero-app-v2 publish:desktop
      - name: Restore Android certificate
        if: matrix.os.name == 'android'
        shell: bash
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > apps/zero-app-v2/src-capacitor/upload-keystore.jks
      - name: Configure Android SDK
        if: matrix.os.name == 'android'
        shell: pwsh
        run: |
          $sdk="$env:ANDROID_SDK_ROOT"
          if (-not $sdk) { $sdk="$env:ANDROID_HOME" }
          $sdk = $sdk -replace '\\','\\\\'
          echo "ANDROID_HOME=$sdk" >> $env:GITHUB_ENV
          "sdk.dir=$sdk" | Out-File -Encoding ascii apps/zero-app-v2/android/local.properties
      - name: Setup Java
        if: matrix.os.name == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Setup Android SDK
        if: matrix.os.name == 'android'
        uses: android-actions/setup-android@v3
      - name: Install build tools
        if: matrix.os.name == 'android'
        run: sdkmanager "build-tools;34.0.0"
      - name: Add build-tools to PATH
        if: matrix.os.name == 'android'
        run: echo "$env:ANDROID_SDK_ROOT\build-tools\34.0.0" >> $env:GITHUB_PATH
      - name: Inject KEYSTORE_PASSWORD
        if: matrix.os.name == 'android'
        run: |
          $file = "apps/zero-app-v2/capacitor.config.ts"
          (Get-Content $file) `
            -replace 'process\.env\.KEYSTORE_PASSWORD', '"${{ secrets.KEYSTORE_PASSWORD }}"' `
            | Set-Content $file
      - name: Build Android app
        if: matrix.os.name == 'android'
        run: pnpm run build:android
      - name: Upload Android outputs to release
        if: matrix.os.name == 'android'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./apps/zero-app-v2/package.json').version")
          TAG="v$VERSION"
          for file in apps/zero-app-v2/out-capacitor/*; do
            echo "Uploading $file"
            gh release upload "$TAG" "$file" --clobber
          done
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os.name }}
          path: |
            apps/zero-app-v2/out/**
            apps/zero-app-v2/out-capacitor/**
            apps/zero-app-v2/out-electron/**
