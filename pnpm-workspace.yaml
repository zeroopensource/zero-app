packages:
  - apps/*
  - packages/*

catalog:
  react: ^19.2.3
  react-dom: ^19.2.3
  typescript: ^5.9.3

supportedArchitectures:
  cpu: [ x64, arm64 ]
  os: [ win32, darwin, current ]

nodeLinker: hoisted
publicHoistPattern:
  - electron*
  - "@electron/*"
  - "@electron-forge/*"
  - electron-forge
  - electron-squirrel-startup
  - electron-serve
sharedWorkspaceLockfile: false

blockExoticSubdeps: false

onlyBuiltDependencies:
- electron-winstaller

ignoredBuiltDependencies:
- sharp

allowBuilds:
  '@bitdisaster/exe-icon-extractor': true
  '@electron/build-tools': true
  electron: true
  electron-winstaller: true
  esbuild: true
  fs-xattr: true
  macos-alias: true
  msw: true
  sharp: false
